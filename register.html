<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Premium Motorsport Racing Team</title>
  <meta name="description" content="Register for the exclusive Premium Motorsport Racing Team portal.">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <style>
    /* Specific styles for Auth Pages */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('https://images.unsplash.com/photo-1536643272993-27082f4b46c6?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
      position: relative;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 10, 10, 0.85); /* Dark overlay */
    }
    .auth-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      padding: 3rem;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--brand-orange);
      border-radius: 16px;
      box-shadow: 0 0 30px var(--brand-orange-glow);
      animation: motionBlurIn 1s ease-out;
      margin: 2rem;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
      font-family: var(--font-heading);
      font-size: 2rem;
      color: var(--brand-orange);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .btn-submit {
      width: 100%;
    }
    .auth-footer {
      margin-top: 2rem;
      text-align: center;
      color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--brand-orange);
      transition: var(--transition-fast);
    }
    .auth-footer a:hover {
      text-shadow: 0 0 8px var(--brand-orange-glow);
    }
    .password-wrapper { position: relative; }
    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.2rem;
      cursor: none !important;
    }
    [dir="rtl"] .toggle-password {
      right: auto;
      left: 15px;
    }
    .toggles {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 15px;
      z-index: 20;
    }
    [dir="rtl"] .toggles {
      right: auto;
      left: 20px;
    }
    .toggle-btn {
      background: var(--glass-bg);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
      cursor: none !important;
    }
    .toggle-btn:hover {
      border-color: var(--brand-orange);
      box-shadow: 0 0 10px var(--brand-orange-glow);
    }
  </style>
</head>
<body>
  <div class="toggles">
    <button class="toggle-btn theme-toggle" title="Toggle Theme">🌓</button>
    <button class="toggle-btn rtl-toggle" title="Toggle RTL">⇄</button>
  </div>

  <main class="auth-page">
    <div class="speed-lines"></div>
    <div class="auth-container glass-card">
      <h1 class="auth-logo">JOIN TEAM</h1>
      
      <form action="login.html" method="GET">
        <div class="form-group" style="display:flex; gap:1rem;">
          <input type="text" class="form-control" placeholder="First Name" required>
          <input type="text" class="form-control" placeholder="Last Name" required>
        </div>
        <div class="form-group">
          <input type="email" class="form-control" placeholder="Email Address" required>
        </div>
        <div class="form-group password-wrapper">
          <input type="password" class="form-control" id="password" placeholder="Password" required>
          <button type="button" class="toggle-password" onclick="const p=document.getElementById('password'); p.type=p.type==='password'?'text':'password';">👁</button>
        </div>
        <div class="form-group password-wrapper">
          <input type="password" class="form-control" id="confirm-password" placeholder="Confirm Password" required>
          <button type="button" class="toggle-password" onclick="const p=document.getElementById('confirm-password'); p.type=p.type==='password'?'text':'password';">👁</button>
        </div>
        
        <div class="form-group" style="font-size: 0.9rem;">
          <label style="display:flex; align-items:start; gap:8px;">
            <input type="checkbox" required style="margin-top: 4px;"> 
            <span>I agree to the <a href="#" style="color:var(--brand-orange);">Terms of Service</a> and <a href="#" style="color:var(--brand-orange);">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-submit">CREATE ACCOUNT</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login Here</a>
      </div>
    </div>
  </main>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/animations.js"></script>
</body>
</html>
