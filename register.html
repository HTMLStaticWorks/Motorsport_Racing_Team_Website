<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <title>Register - Premium Motorsport Racing Team</title>
  <meta name="description" content="Register for the exclusive Premium Motorsport Racing Team portal.">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <style>
    /* Specific styles for Auth Pages */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('https://images.unsplash.com/photo-1536643272993-27082f4b46c6?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
      position: relative;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 10, 10, 0.85); /* Dark overlay */
    }
    .auth-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      padding: 3rem;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--brand-orange);
      border-radius: 16px;
      box-shadow: 0 0 30px var(--brand-orange-glow);
      animation: motionBlurIn 1s ease-out;
      margin: 2rem;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
      font-family: var(--font-heading);
      font-size: 2rem;
      color: var(--brand-orange);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .social-logins {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2rem;
    }
    .btn-social {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 4px;
      transition: var(--transition-fast);
      font-family: var(--font-primary);
      cursor: pointer;
    }
    .btn-social:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--brand-orange);
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-secondary);
      margin-top: 2rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }
    .divider:not(:empty)::before { margin-right: .25em; }
    .divider:not(:empty)::after { margin-left: .25em; }
    .btn-submit {
      width: 100%;
    }
    .auth-footer {
      margin-top: 2rem;
      text-align: center;
      color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--brand-orange);
      transition: var(--transition-fast);
    }
    .auth-footer a:hover {
      text-shadow: 0 0 8px var(--brand-orange-glow);
    }
    .password-wrapper { position: relative; }
    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.2rem;
      cursor: none !important;
    }
    [dir="rtl"] .toggle-password {
      right: auto;
      left: 15px;
    }
    .toggles {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 15px;
      z-index: 20;
    }
    [dir="rtl"] .toggles {
      right: auto;
      left: 20px;
    }
    .toggle-btn {
      background: var(--glass-bg);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
      cursor: none !important;
    }
    .toggle-btn:hover {
      border-color: var(--brand-orange);
      box-shadow: 0 0 10px var(--brand-orange-glow);
    }
    @media (max-width: 768px) {
      .toggles {
        position: absolute;
        top: 15px;
        right: 15px;
        z-index: 100;
      }
      .auth-container {
        margin-top: 70px;
      }
    }
  </style>
</head>
<body>
  <div class="toggles">
    <button class="toggle-btn theme-toggle" title="Toggle Theme">??</button>
    <button class="toggle-btn rtl-toggle" title="Toggle RTL">?</button>
  </div>
  <main class="auth-page">
    <div class="speed-lines"></div>
    <div class="auth-container glass-card">
      <h1 class="auth-logo"><a href="index.html" style="color: inherit; text-decoration: none; display: flex; align-items: center; justify-content: center;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--brand-orange)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: text-bottom;"><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a2 2 0 0 0-1.6-.8H9.3a2 2 0 0 0-1.6.8L5 11l-5.16.86a1 1 0 0 0-.84.99V16h3m14 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM7 16a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"></path></svg>RACING TEAM</a></h1>
      
      <form action="login.html" method="GET">
        <div class="form-group">
          <input type="text" class="form-control" placeholder="First Name" required>
        </div>
        <div class="form-group">
          <input type="text" class="form-control" placeholder="Last Name" required>
        </div>
        <div class="form-group">
          <input type="email" class="form-control" placeholder="Email Address" required>
        </div>
        <div class="form-group password-wrapper">
          <input type="password" class="form-control" id="password" placeholder="Password" required>
          <button type="button" class="toggle-password" onclick="const p=document.getElementById('password'); p.type=p.type==='password'?'text':'password';">??</button>
        </div>
        <div class="form-group password-wrapper">
          <input type="password" class="form-control" id="confirm-password" placeholder="Confirm Password" required>
          <button type="button" class="toggle-password" onclick="const p=document.getElementById('confirm-password'); p.type=p.type==='password'?'text':'password';">??</button>
        </div>
        
        <div class="form-group" style="font-size: 0.8rem;">
          <label style="display:flex; align-items:start; gap:8px;">
            <input type="checkbox" required style="margin-top: 4px;"> 
            <span>I agree to the <a href="#" style="color:var(--brand-orange);">Terms of Service</a> and <a href="#" style="color:var(--brand-orange);">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-submit">CREATE ACCOUNT</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login Here</a>
      </div>

      <div class="divider">OR</div>

      <div class="social-logins">
        <button class="btn-social">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
          Continue with Google
        </button>
        <button class="btn-social">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.08.45-2.1.58-3.01-.36-4.11-4.04-4.83-11.51-1.04-14.77 1.44-1.25 3.06-1.55 4.31-1.55 1.25 0 2.45.54 3.48 1.11.83.47 1.48.86 2.44.86 1.05 0 1.8-.46 2.8-1.05 1.15-.67 2.62-1.37 4.26-1.11 1.06.17 2.76.71 3.99 2.5-.2.13-2.45 1.48-2.39 4.32.07 3.32 2.87 4.41 3.01 4.47-.02.06-.47 1.63-1.61 3.29-1.01 1.48-2.11 3.01-3.93 2.93zm-3.35-18.06c-.66.82-1.63 1.34-2.67 1.27-.13-1.09.35-2.14 1.06-2.92.65-.75 1.63-1.35 2.68-1.29.13 1.13-.37 2.16-1.07 2.94z"/></svg>
          Continue with Apple
        </button>
      </div>
    </div>
  </main>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/animations.js"></script>
  <button id="backToTop" class="back-to-top" title="Back to Top">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>
</body>
</html>
